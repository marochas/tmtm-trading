<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TMTM – Tímová analýza obchodov</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0c14; --bg2: #111422; --bg3: #1a1e30; --border: #252a42;
      --accent: #4f8ef7; --accent2: #6c63ff; --accent-glow: rgba(79,142,247,0.2);
      --green: #22c55e; --yellow: #f59e0b; --red: #ef4444;
      --text: #e2e8f0; --text2: #8896b3; --radius: 10px;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
    #root { min-height: 100vh; }

    /* Layout */
    .layout { display: flex; min-height: 100vh; }
    .sidebar { width: 230px; min-height: 100vh; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; left: 0; top: 0; bottom: 0; z-index: 100; box-shadow: 2px 0 20px rgba(0,0,0,0.4); }
    .main { margin-left: 230px; flex: 1; padding: 28px 32px; background: var(--bg); }
    .logo { padding: 22px 20px 18px; border-bottom: 1px solid var(--border); background: linear-gradient(135deg, var(--bg2), var(--bg3)); }
    .logo h1 { font-size: 1.25rem; font-weight: 800; color: var(--accent); letter-spacing: -0.3px; text-shadow: 0 0 20px var(--accent-glow); }
    .logo p { font-size: 0.72rem; color: var(--text2); margin-top: 2px; }
    .nav { padding: 12px 0; flex: 1; overflow-y: auto; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; cursor: pointer; color: var(--text2); font-size: 0.9rem; border-left: 3px solid transparent; transition: all 0.15s; border-radius: 0; }
    .nav-item:hover { background: var(--bg3); color: var(--text); }
    .nav-item.active { color: var(--accent); background: var(--accent-glow); border-left-color: var(--accent); }
    .nav-icon { font-size: 1.1rem; width: 22px; text-align: center; }
    .user-panel { padding: 12px 14px; border-top: 1px solid var(--border); background: linear-gradient(to top, rgba(0,0,0,0.2), transparent); }
    .user-info { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 700; color: #fff; flex-shrink: 0; box-shadow: 0 2px 8px var(--accent-glow); }
    .user-name { font-size: 0.82rem; font-weight: 600; }
    .user-role { font-size: 0.68rem; color: var(--text2); }
    .notif-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 14px; border-bottom: 1px solid var(--border); }
    .notif-btn { position: relative; background: none; border: none; cursor: pointer; padding: 6px 8px; color: var(--text2); font-size: 1.15rem; transition: color 0.15s; border-radius: 8px; }
    .notif-btn:hover { color: var(--text); background: var(--bg3); }
    .notif-badge { position: absolute; top: 1px; right: 1px; background: var(--red); color: #fff; border-radius: 50%; width: 15px; height: 15px; font-size: 0.6rem; font-weight: 700; display: flex; align-items: center; justify-content: center; }
    .notif-panel { position: fixed; left: 240px; bottom: 80px; width: 340px; background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; box-shadow: 0 16px 48px rgba(0,0,0,0.6); z-index: 400; max-height: 420px; overflow-y: auto; }
    .notif-panel-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-weight: 600; font-size: 0.88rem; position: sticky; top: 0; background: var(--bg2); }
    .notif-item { padding: 11px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.12s; }
    .notif-item:hover { background: var(--bg3); }
    .notif-item:last-child { border-bottom: none; }
    .notif-item.unread { background: rgba(79,142,247,0.06); border-left: 2px solid var(--accent); padding-left: 14px; }
    .notif-msg { font-size: 0.81rem; line-height: 1.45; color: var(--text); }
    .notif-time { font-size: 0.7rem; color: var(--text2); margin-top: 3px; }

    /* Login */
    .login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(ellipse at center, #111626 0%, var(--bg) 70%); padding: 20px; }
    .login-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 24px 64px rgba(0,0,0,0.6), 0 0 0 1px rgba(79,142,247,0.1); }
    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo h1 { font-size: 2rem; font-weight: 800; color: var(--accent); margin-bottom: 4px; text-shadow: 0 0 30px var(--accent-glow); }
    .login-logo p { color: var(--text2); font-size: 0.875rem; }

    /* Cards */
    .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.25); }
    .card-sm { padding: 14px 18px; }

    /* KPI Grid */
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; margin-bottom: 24px; }
    .kpi { background: linear-gradient(135deg, var(--bg2) 0%, var(--bg3) 100%); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; position: relative; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
    .kpi::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
    .kpi-label { font-size: 0.72rem; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .kpi-value { font-size: 1.9rem; font-weight: 800; line-height: 1; }
    .kpi-sub { font-size: 0.75rem; color: var(--text2); margin-top: 4px; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 7px; border: none; cursor: pointer; font-size: 0.875rem; font-weight: 500; transition: all 0.15s; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #3a7de0; }
    .btn-secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--border); }
    .btn-sm { padding: 5px 12px; font-size: 0.8rem; }
    .btn-danger { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
    .btn-danger:hover { background: rgba(239,68,68,0.25); }
    .btn-success { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
    .btn-success:hover { background: rgba(34,197,94,0.25); }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }

    /* Badges */
    .badge { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 0.72rem; font-weight: 600; }
    .badge-green { background: rgba(34,197,94,0.15); color: var(--green); }
    .badge-yellow { background: rgba(245,158,11,0.15); color: var(--yellow); }
    .badge-red { background: rgba(239,68,68,0.15); color: var(--red); }
    .badge-blue { background: rgba(79,142,247,0.15); color: var(--accent); }
    .badge-gray { background: var(--bg3); color: var(--text2); }

    /* Verdict */
    .verdict-banner { border-radius: var(--radius); padding: 16px 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 14px; font-weight: 700; font-size: 1.1rem; }
    .verdict-go { background: rgba(34,197,94,0.12); border: 1.5px solid var(--green); color: var(--green); }
    .verdict-confirm { background: rgba(245,158,11,0.12); border: 1.5px solid var(--yellow); color: var(--yellow); }
    .verdict-no { background: rgba(239,68,68,0.12); border: 1.5px solid var(--red); color: var(--red); }
    .verdict-none { background: var(--bg3); border: 1.5px solid var(--border); color: var(--text2); }

    /* Trade cards */
    .trade-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
    .trade-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; cursor: pointer; transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.25); }
    .trade-card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 8px 24px rgba(79,142,247,0.15); }
    .trade-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
    .trade-id { font-size: 0.75rem; color: var(--text2); font-family: monospace; }
    .trade-instrument { font-size: 1.15rem; font-weight: 700; margin-bottom: 4px; }
    .trade-meta { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 12px; }
    .trade-votes { display: flex; gap: 8px; margin-top: 10px; }
    .vote-pill { display: flex; align-items: center; gap: 4px; font-size: 0.78rem; padding: 3px 9px; border-radius: 20px; }
    .vote-pill-green { background: rgba(34,197,94,0.12); color: var(--green); }
    .vote-pill-yellow { background: rgba(245,158,11,0.12); color: var(--yellow); }
    .vote-pill-red { background: rgba(239,68,68,0.12); color: var(--red); }

    /* Forms */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-grid-3 { grid-template-columns: 1fr 1fr 1fr; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 0.78rem; color: var(--text2); font-weight: 500; }
    input, select, textarea { background: var(--bg3); border: 1px solid var(--border); border-radius: 7px; padding: 8px 12px; color: var(--text); font-size: 0.875rem; outline: none; width: 100%; }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 70px; }
    select option { background: var(--bg3); }
    input[readonly] { opacity: 0.7; cursor: not-allowed; }

    /* Image upload */
    .img-upload-box { border: 2px dashed var(--border); border-radius: 10px; padding: 20px; text-align: center; cursor: pointer; transition: border-color 0.15s; }
    .img-upload-box:hover { border-color: var(--accent); }
    .img-upload-box.has-img { padding: 0; border-style: solid; overflow: hidden; }
    .img-upload-box img { width: 100%; max-height: 300px; object-fit: contain; display: block; border-radius: 8px; }
    .img-preview-full { width: 100%; max-height: 400px; object-fit: contain; border-radius: 10px; border: 1px solid var(--border); cursor: pointer; }

    /* Page headers */
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; }
    .page-title { font-size: 1.4rem; font-weight: 700; }
    .section-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.7px; color: var(--text2); margin-bottom: 12px; font-weight: 600; }
    .divider { border: none; border-top: 1px solid var(--border); margin: 18px 0; }

    /* Trade detail */
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .detail-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 0.875rem; }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { color: var(--text2); }
    .detail-value { font-weight: 500; }

    /* Review cards */
    .review-card { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
    .review-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .reviewer-name { font-weight: 700; font-size: 0.95rem; }
    .review-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 10px; }
    .stat-box { background: var(--bg2); border-radius: 7px; padding: 8px 12px; }
    .stat-box-label { font-size: 0.68rem; color: var(--text2); text-transform: uppercase; letter-spacing: 0.4px; }
    .stat-box-value { font-size: 1rem; font-weight: 700; margin-top: 2px; }

    /* Votes bar */
    .votes-bar { display: flex; gap: 2px; height: 8px; border-radius: 6px; overflow: hidden; margin: 8px 0; }
    .votes-bar-seg { height: 100%; }

    /* Modal */
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; width: 100%; max-width: 700px; max-height: 90vh; overflow-y: auto; padding: 28px; position: relative; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; }
    .modal-title { font-size: 1.2rem; font-weight: 700; }
    .modal-close { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 1.4rem; line-height: 1; padding: 4px; }
    .modal-close:hover { color: var(--text); }

    /* Conditions */
    .condition-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; font-size: 0.85rem; }
    .condition-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .cond-active { background: var(--green); }
    .cond-inactive { background: var(--border); }

    /* Alerts */
    .alert { padding: 12px 16px; border-radius: 8px; font-size: 0.875rem; margin-bottom: 16px; }
    .alert-info { background: rgba(79,142,247,0.1); border: 1px solid rgba(79,142,247,0.3); color: #93c5fd; }
    .alert-success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #86efac; }
    .alert-error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }

    /* Tabs */
    .tabs { display: flex; gap: 4px; background: var(--bg3); border-radius: 9px; padding: 4px; margin-bottom: 20px; flex-wrap: wrap; }
    .tab { flex: 1; padding: 7px 6px; text-align: center; border-radius: 7px; cursor: pointer; font-size: 0.83rem; color: var(--text2); transition: all 0.15s; white-space: nowrap; }
    .tab.active { background: var(--bg2); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.3); }

    /* Settings */
    .settings-section { margin-bottom: 28px; }
    .tag-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .tag { display: flex; align-items: center; gap: 6px; background: var(--bg3); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 0.82rem; }
    .tag-remove { cursor: pointer; color: var(--text2); font-size: 1rem; line-height: 1; }
    .tag-remove:hover { color: var(--red); }

    /* Stats grid */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
    .stat-row:last-child { border-bottom: none; }

    /* Result colors */
    .result-pos { color: var(--green); font-weight: 700; }
    .result-neg { color: var(--red); font-weight: 700; }

    /* User table */
    .user-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .user-table th { text-align: left; padding: 8px 12px; color: var(--text2); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
    .user-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
    .user-table tr:last-child td { border-bottom: none; }

    .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }
    .empty-icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-text { font-size: 1rem; margin-bottom: 6px; color: var(--text); }
    .empty-sub { font-size: 0.85rem; }

    .back-btn { display: flex; align-items: center; gap: 6px; color: var(--text2); font-size: 0.875rem; cursor: pointer; margin-bottom: 18px; }
    .back-btn:hover { color: var(--text); }

    @media (max-width: 768px) {
      .sidebar { width: 200px; }
      .main { margin-left: 200px; padding: 16px; }
      .detail-grid { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ─── AUTH TOKEN ──────────────────────────────────────────────────────────────

function getToken() { try { return localStorage.getItem('tmtm_token'); } catch { return null; } }
function setToken(t) { try { localStorage.setItem('tmtm_token', t); } catch {} }
function clearToken() { try { localStorage.removeItem('tmtm_token'); } catch {} }

async function apiFetch(path, opts = {}) {
  const token = getToken();
  const headers = { 'Content-Type': 'application/json' };
  if (token) headers['X-Auth-Token'] = token;
  const res = await fetch(path, {
    headers,
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    throw new Error(e.error || 'Chyba servera');
  }
  return res.json();
}

// ─── IMAGE UTIL ──────────────────────────────────────────────────────────────

function resizeImageToBase64(file, maxWidth = 1200, quality = 0.82) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new window.Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────

function VerdictBadge({ verdict }) {
  const map = {
    'Schválené': 'badge-green', 'Na revíziu': 'badge-yellow', 'Zamietnuté': 'badge-red',
    'Obchodovať': 'badge-green', 'Na potvrdenie': 'badge-yellow',
    'Neobchodovať': 'badge-red', 'Bez hodnotenia': 'badge-gray',
  };
  return <span className={`badge ${map[verdict] || 'badge-gray'}`}>{verdict}</span>;
}

function VerdictBanner({ verdict }) {
  const map = {
    'Obchodovať': { cls: 'verdict-go', icon: '✅', text: 'OBCHODOVAŤ' },
    'Na potvrdenie': { cls: 'verdict-confirm', icon: '⚠️', text: 'NA POTVRDENIE' },
    'Neobchodovať': { cls: 'verdict-no', icon: '❌', text: 'NEOBCHODOVAŤ' },
    'Bez hodnotenia': { cls: 'verdict-none', icon: '⏳', text: 'ČAKÁ NA HODNOTENIE' },
  };
  const v = map[verdict] || map['Bez hodnotenia'];
  return (
    <div className={`verdict-banner ${v.cls}`}>
      <span style={{fontSize:'1.5rem'}}>{v.icon}</span>
      <span>Tímové rozhodnutie: {v.text}</span>
    </div>
  );
}

function DirectionBadge({ dir }) {
  return <span className={`badge ${dir === 'Long' ? 'badge-green' : 'badge-red'}`}>{dir === 'Long' ? '▲ Long' : '▼ Short'}</span>;
}

function TradeStatusBadge({ status }) {
  if (!status) return null;
  const map = {
    'Otvorený': 'badge-blue', 'Uzatvorený': 'badge-green', 'Zrušený': 'badge-gray'
  };
  const icons = { 'Otvorený': '🟦', 'Uzatvorený': '✅', 'Zrušený': '⛔' };
  return <span className={`badge ${map[status] || 'badge-gray'}`}>{icons[status] || ''} {status}</span>;
}

// ─── LOGIN PAGE ───────────────────────────────────────────────────────────────

function LoginPage({ onLogin }) {
  const [form, setForm] = useState({ username: '', password: '' });
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const handleSubmit = async (e) => {
    e.preventDefault();
    setLoading(true); setError('');
    try {
      const { token, user } = await apiFetch('/api/auth/login', { method: 'POST', body: form });
      setToken(token);
      onLogin(user);
    } catch (e) { setError(e.message); }
    setLoading(false);
  };

  return (
    <div className="login-page">
      <div className="login-card">
        <div className="login-logo">
          <div style={{fontSize:'2.5rem', marginBottom:8}}>📈</div>
          <h1>TMTM Trading</h1>
          <p>Tímová analýza obchodov</p>
        </div>
        {error && <div className="alert alert-error">{error}</div>}
        <form onSubmit={handleSubmit}>
          <div className="form-group" style={{marginBottom:14}}>
            <label>Používateľské meno</label>
            <input autoFocus value={form.username} onChange={e => setForm(f => ({...f, username: e.target.value}))}
              placeholder="tomino / maros / milos / topier" required/>
          </div>
          <div className="form-group" style={{marginBottom:20}}>
            <label>Heslo</label>
            <input type="password" value={form.password} onChange={e => setForm(f => ({...f, password: e.target.value}))}
              placeholder="••••••••" required/>
          </div>
          <button type="submit" className="btn btn-primary" style={{width:'100%', justifyContent:'center', padding:'10px'}} disabled={loading}>
            {loading ? <><div className="spinner" style={{width:16,height:16}}/> Prihlasujem...</> : '🔓 Prihlásiť sa'}
          </button>
        </form>
        <div style={{marginTop:20, padding:'12px 14px', background:'var(--bg3)', borderRadius:8, fontSize:'0.78rem', color:'var(--text2)', lineHeight:1.7}}>
          <strong style={{color:'var(--text)'}}>Predvolené heslá:</strong><br/>
          tomino / maros / milos / topier → <code style={{color:'var(--accent)'}}>tmtm2024</code><br/>
          admin → <code style={{color:'var(--accent)'}}>admin123</code>
        </div>
      </div>
    </div>
  );
}

// ─── TRADES LIST ─────────────────────────────────────────────────────────────

function TradesList({ onNavigate }) {
  const [trades, setTrades] = useState([]);
  const [loading, setLoading] = useState(true);
  const [filter, setFilter] = useState('all');

  useEffect(() => {
    apiFetch('/api/trades').then(t => { setTrades(t); setLoading(false); }).catch(console.error);
  }, []);

  const filtered = trades.filter(t => {
    if (filter === 'all') return true;
    if (filter === 'open') return t.trade_status === 'Otvorený';
    if (filter === 'closed') return t.trade_status === 'Uzatvorený';
    if (filter === 'go') return t.team_verdict === 'Obchodovať';
    if (filter === 'pending') return t.team_verdict === 'Na potvrdenie';
    return true;
  });

  if (loading) return <div style={{display:'flex',alignItems:'center',gap:10,padding:40}}><div className="spinner"/></div>;

  return (
    <div>
      <div className="page-header">
        <div className="page-title">💼 Obchodné nápady</div>
        <button className="btn btn-primary" onClick={() => onNavigate('new-trade')}>+ Nový obchod</button>
      </div>
      <div className="tabs">
        {[['all','Všetky'],['open','Otvorené'],['closed','Uzatvorené'],['go','Obchodovať'],['pending','Na potvrdenie']].map(([k,l]) => (
          <div key={k} className={`tab ${filter===k?'active':''}`} onClick={() => setFilter(k)}>{l}</div>
        ))}
      </div>
      {filtered.length === 0 ? (
        <div className="empty-state">
          <div className="empty-icon">📋</div>
          <div className="empty-text">Žiadne obchody</div>
          <div className="empty-sub">Vytvor prvý obchodný nápad kliknutím na "Nový obchod"</div>
        </div>
      ) : (
        <div className="trade-grid">
          {filtered.map(t => <TradeCard key={t.id} trade={t} onNavigate={onNavigate} />)}
        </div>
      )}
    </div>
  );
}

function TradeCard({ trade: t, onNavigate }) {
  const total = t.approved + t.revision + t.rejected;
  return (
    <div className="trade-card" onClick={() => onNavigate('trade-detail', t.id)}>
      <div className="trade-card-header">
        <div>
          <div className="trade-id">{t.id} · {t.created_at}</div>
          <div className="trade-instrument">{t.instrument}</div>
        </div>
        <div style={{display:'flex', flexDirection:'column', alignItems:'flex-end', gap:5}}>
          <VerdictBadge verdict={t.team_verdict} />
          <TradeStatusBadge status={t.trade_status} />
        </div>
      </div>
      <div className="trade-meta">
        <DirectionBadge dir={t.direction} />
        <span className="badge badge-blue">{t.timeframe}</span>
        <span className={`badge ${t.trend_context === 'Do trendu' ? 'badge-green' : 'badge-yellow'}`}>{t.trend_context}</span>
      </div>
      {(t.entry_price || t.stop_loss || t.take_profit) && (
        <div style={{display:'flex', gap:12, fontSize:'0.78rem', color:'var(--text2)', marginBottom:8}}>
          {t.entry_price && <span>E: <strong style={{color:'var(--text)'}}>{t.entry_price}</strong></span>}
          {t.stop_loss && <span>SL: <strong style={{color:'var(--red)'}}>{t.stop_loss}</strong></span>}
          {t.take_profit && <span>TP: <strong style={{color:'var(--green)'}}>{t.take_profit}</strong></span>}
        </div>
      )}
      {t.trade_status === 'Uzatvorený' && t.result_pips !== null && t.result_pips !== undefined && (
        <div style={{fontSize:'0.82rem', marginBottom:8}}>
          Výsledok: <span className={t.result_pips >= 0 ? 'result-pos' : 'result-neg'}>{t.result_pips >= 0 ? '+' : ''}{t.result_pips} pips</span>
          {t.result_rr && <span style={{color:'var(--text2)', marginLeft:8}}>({t.result_rr >= 0 ? '+' : ''}{t.result_rr}R)</span>}
        </div>
      )}
      <div style={{fontSize:'0.75rem', color:'var(--text2)', marginBottom:6}}>Zadal: <strong style={{color:'var(--text)'}}>{t.submitted_by}</strong></div>
      {total > 0 ? (
        <div>
          <div className="votes-bar">
            {t.approved > 0 && <div className="votes-bar-seg" style={{width:`${t.approved/total*100}%`, background:'var(--green)'}}/>}
            {t.revision > 0 && <div className="votes-bar-seg" style={{width:`${t.revision/total*100}%`, background:'var(--yellow)'}}/>}
            {t.rejected > 0 && <div className="votes-bar-seg" style={{width:`${t.rejected/total*100}%`, background:'var(--red)'}}/>}
          </div>
          <div className="trade-votes">
            <span className="vote-pill vote-pill-green">✅ {t.approved}</span>
            <span className="vote-pill vote-pill-yellow">⚠️ {t.revision}</span>
            <span className="vote-pill vote-pill-red">❌ {t.rejected}</span>
            <span style={{fontSize:'0.75rem', color:'var(--text2)', marginLeft:'auto'}}>{total} hodnotení</span>
          </div>
        </div>
      ) : (
        <div style={{fontSize:'0.78rem', color:'var(--text2)'}}>Žiadne hodnotenia ešte</div>
      )}
    </div>
  );
}

// ─── TRADE DETAIL ─────────────────────────────────────────────────────────────

function TradeDetail({ tradeId, onNavigate, onReview, currentUser }) {
  const [trade, setTrade] = useState(null);
  const [loading, setLoading] = useState(true);
  const [config, setConfig] = useState(null);
  const [showClose, setShowClose] = useState(false);
  const [showImgFull, setShowImgFull] = useState(false);

  const reload = useCallback(() => {
    apiFetch(`/api/trades/${tradeId}`).then(t => { setTrade(t); setLoading(false); });
  }, [tradeId]);

  useEffect(() => {
    reload();
    apiFetch('/api/config').then(setConfig);
  }, [reload]);

  if (loading || !config) return <div style={{display:'flex',alignItems:'center',gap:10,padding:40}}><div className="spinner"/></div>;
  if (!trade) return <div className="alert alert-error">Obchod nenájdený.</div>;

  const conditions = [trade.condition1, trade.condition2, trade.condition3, trade.condition4].filter(Boolean);
  const reviewedBy = trade.reviews.map(r => r.reviewer);
  const pendingTraders = config.traders.filter(t => !reviewedBy.includes(t));
  const canClose = currentUser && (currentUser.role === 'admin' || currentUser.trader_name === trade.submitted_by);
  const hasReviewed = currentUser?.trader_name && reviewedBy.includes(currentUser.trader_name);

  return (
    <div>
      <div className="back-btn" onClick={() => onNavigate('trades')}>← Späť na zoznam</div>

      <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:16}}>
        <div>
          <div style={{fontSize:'0.8rem', color:'var(--text2)', fontFamily:'monospace'}}>{trade.id} · {trade.created_at}</div>
          <div style={{fontSize:'1.8rem', fontWeight:800}}>{trade.instrument}</div>
          <div style={{display:'flex', gap:8, marginTop:6, flexWrap:'wrap'}}>
            <DirectionBadge dir={trade.direction} />
            <span className="badge badge-blue">{trade.timeframe}</span>
            <span className={`badge ${trade.trend_context === 'Do trendu' ? 'badge-green' : 'badge-yellow'}`}>{trade.trend_context}</span>
            <span className="badge badge-gray">{trade.entry_type} vstup</span>
            <span className="badge badge-gray">HTF: {trade.htf_confirmed}</span>
            <TradeStatusBadge status={trade.trade_status} />
          </div>
        </div>
        <div style={{display:'flex', gap:8, flexWrap:'wrap', justifyContent:'flex-end'}}>
          {trade.trade_status === 'Otvorený' && (
            <button className="btn btn-primary btn-sm" onClick={() => onReview(trade)}>
              {hasReviewed ? '✏️ Upraviť hodnotenie' : '+ Moje hodnotenie'}
            </button>
          )}
          {canClose && trade.trade_status === 'Otvorený' && (
            <button className="btn btn-success btn-sm" onClick={() => setShowClose(true)}>🏁 Uzatvoriť obchod</button>
          )}
        </div>
      </div>

      <VerdictBanner verdict={trade.team_verdict} />

      {/* Result banner if closed */}
      {trade.trade_status === 'Uzatvorený' && (
        <div style={{background:'var(--bg2)', border:'1px solid var(--border)', borderRadius:10, padding:'14px 20px', marginBottom:20}}>
          <div className="section-title">Výsledok obchodu</div>
          <div style={{display:'flex', gap:24, flexWrap:'wrap'}}>
            <div>
              <div style={{fontSize:'0.72rem', color:'var(--text2)'}}>Dátum uzatvorenia</div>
              <div style={{fontWeight:600}}>{trade.close_date || '—'}</div>
            </div>
            {trade.result_pips !== null && trade.result_pips !== undefined && (
              <div>
                <div style={{fontSize:'0.72rem', color:'var(--text2)'}}>Pips</div>
                <div className={trade.result_pips >= 0 ? 'result-pos' : 'result-neg'} style={{fontSize:'1.3rem'}}>
                  {trade.result_pips >= 0 ? '+' : ''}{trade.result_pips}
                </div>
              </div>
            )}
            {trade.result_rr !== null && trade.result_rr !== undefined && (
              <div>
                <div style={{fontSize:'0.72rem', color:'var(--text2)'}}>R násobok</div>
                <div className={trade.result_rr >= 0 ? 'result-pos' : 'result-neg'} style={{fontSize:'1.3rem'}}>
                  {trade.result_rr >= 0 ? '+' : ''}{trade.result_rr}R
                </div>
              </div>
            )}
            {trade.result_note && (
              <div style={{flex:1}}>
                <div style={{fontSize:'0.72rem', color:'var(--text2)'}}>Poznámka</div>
                <div style={{fontSize:'0.875rem'}}>{trade.result_note}</div>
              </div>
            )}
          </div>
        </div>
      )}

      <div className="detail-grid" style={{marginBottom:20}}>
        <div className="card">
          <div className="section-title">Myšlienka setupu</div>
          <p style={{fontSize:'0.9rem', lineHeight:1.6}}>{trade.idea_description}</p>
          <div style={{marginTop:12, fontSize:'0.8rem', color:'var(--text2)'}}>Zadal: <strong style={{color:'var(--text)'}}>{trade.submitted_by}</strong></div>

          {/* Submitter's entry levels */}
          {(trade.entry_price || trade.stop_loss || trade.take_profit) && (
            <div style={{marginTop:14}}>
              <div className="section-title">Plánované hodnoty</div>
              <div style={{display:'flex', gap:12, flexWrap:'wrap'}}>
                {trade.entry_price && (
                  <div className="stat-box" style={{flex:1}}>
                    <div className="stat-box-label">Entry</div>
                    <div className="stat-box-value">{trade.entry_price}</div>
                  </div>
                )}
                {trade.stop_loss && (
                  <div className="stat-box" style={{flex:1}}>
                    <div className="stat-box-label">Stop Loss</div>
                    <div className="stat-box-value" style={{color:'var(--red)'}}>{trade.stop_loss}</div>
                  </div>
                )}
                {trade.take_profit && (
                  <div className="stat-box" style={{flex:1}}>
                    <div className="stat-box-label">Take Profit</div>
                    <div className="stat-box-value" style={{color:'var(--green)'}}>{trade.take_profit}</div>
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
        <div className="card">
          <div className="section-title">Spoločné podmienky</div>
          {conditions.length === 0 ? <div style={{color:'var(--text2)', fontSize:'0.85rem'}}>Žiadne podmienky</div>
            : conditions.map((c, i) => (
              <div key={i} className="condition-item">
                <div className="condition-dot cond-active"/>
                <span style={{fontSize:'0.85rem'}}>{c}</span>
              </div>
            ))}
        </div>
      </div>

      {/* TradingView Screenshot */}
      {trade.image_data && (
        <div className="card" style={{marginBottom:20}}>
          <div className="section-title">📸 TradingView analýza</div>
          <img src={trade.image_data} alt="TradingView chart" className="img-preview-full"
            onClick={() => setShowImgFull(true)} title="Klikni pre zväčšenie"/>
        </div>
      )}

      {/* Team consensus */}
      {(trade.avg_entry || trade.avg_sl || trade.avg_tp) && (
        <div className="card" style={{marginBottom:20}}>
          <div className="section-title">Konsenzus tímu (priemer hodnotení)</div>
          <div style={{display:'flex', gap:16, flexWrap:'wrap'}}>
            {trade.avg_entry && <div className="stat-box" style={{flex:1}}>
              <div className="stat-box-label">Priemerný Entry</div>
              <div className="stat-box-value">{trade.avg_entry}</div>
            </div>}
            {trade.avg_sl && <div className="stat-box" style={{flex:1}}>
              <div className="stat-box-label">Priemerný SL</div>
              <div className="stat-box-value" style={{color:'var(--red)'}}>{trade.avg_sl}</div>
            </div>}
            {trade.avg_tp && <div className="stat-box" style={{flex:1}}>
              <div className="stat-box-label">Priemerný TP</div>
              <div className="stat-box-value" style={{color:'var(--green)'}}>{trade.avg_tp}</div>
            </div>}
            {trade.avg_rrr && <div className="stat-box" style={{flex:1}}>
              <div className="stat-box-label">Priemerné RRR</div>
              <div className="stat-box-value" style={{color: trade.avg_rrr >= 1.5 ? 'var(--green)' : 'var(--yellow)'}}>{trade.avg_rrr}</div>
            </div>}
          </div>
        </div>
      )}

      {/* Votes summary */}
      <div className="card" style={{marginBottom:20}}>
        <div className="section-title">Hlasovanie tímu</div>
        <div style={{display:'flex', gap:24, marginBottom:12}}>
          {[['var(--green)', trade.approved, 'Schválené'],
            ['var(--yellow)', trade.revision, 'Na revíziu'],
            ['var(--red)', trade.rejected, 'Zamietnuté']].map(([color, val, label]) => (
            <div key={label} style={{display:'flex', alignItems:'center', gap:8}}>
              <span style={{color, fontSize:'1.5rem', fontWeight:700}}>{val}</span>
              <span style={{color:'var(--text2)', fontSize:'0.85rem'}}>{label}</span>
            </div>
          ))}
        </div>
        {pendingTraders.length > 0 && (
          <div style={{fontSize:'0.8rem', color:'var(--text2)'}}>⏳ Čakáme na: {pendingTraders.join(', ')}</div>
        )}
      </div>

      <div className="section-title">Hodnotenia traderov ({trade.reviews.length})</div>
      {trade.reviews.length === 0 ? (
        <div className="alert alert-info">Zatiaľ nikto nehodnotil tento obchod.</div>
      ) : trade.reviews.map(r => <ReviewCard key={r.id} review={r} />)}

      {showClose && (
        <CloseTradeModal trade={trade} onClose={() => setShowClose(false)} onClosed={() => { setShowClose(false); reload(); }}/>
      )}
      {showImgFull && (
        <div className="modal-bg" onClick={() => setShowImgFull(false)}>
          <img src={trade.image_data} alt="chart" style={{maxWidth:'95vw', maxHeight:'90vh', borderRadius:10}}/>
        </div>
      )}
    </div>
  );
}

function ReviewCard({ review: r }) {
  const rrr = r.rrr ? r.rrr.toFixed(2) : '—';
  const customConds = [
    r.custom_condition1 ? { text: r.custom_condition1, met: r.custom_condition1_met } : null,
    r.custom_condition2 ? { text: r.custom_condition2, met: r.custom_condition2_met } : null,
    r.custom_condition3 ? { text: r.custom_condition3, met: r.custom_condition3_met } : null,
  ].filter(Boolean);

  return (
    <div className="review-card">
      <div className="review-header">
        <div className="reviewer-name">👤 {r.reviewer}</div>
        <div style={{display:'flex', alignItems:'center', gap:8}}>
          <span style={{fontSize:'0.75rem', color:'var(--text2)'}}>{r.reviewed_at}</span>
          <VerdictBadge verdict={r.verdict} />
        </div>
      </div>
      {(r.proposed_entry || r.proposed_sl || r.proposed_tp) && (
        <div className="review-stats">
          <div className="stat-box">
            <div className="stat-box-label">Entry</div>
            <div className="stat-box-value">{r.proposed_entry ?? '—'}</div>
          </div>
          <div className="stat-box">
            <div className="stat-box-label">Stop Loss</div>
            <div className="stat-box-value" style={{color:'var(--red)'}}>{r.proposed_sl ?? '—'}</div>
          </div>
          <div className="stat-box">
            <div className="stat-box-label">Take Profit</div>
            <div className="stat-box-value" style={{color:'var(--green)'}}>{r.proposed_tp ?? '—'}</div>
          </div>
        </div>
      )}
      <div style={{display:'flex', gap:12, fontSize:'0.8rem', color:'var(--text2)', marginBottom:10, flexWrap:'wrap'}}>
        <span>RRR: <strong style={{color: r.rrr >= 1.5 ? 'var(--green)' : 'var(--red)'}}>{rrr}</strong></span>
        {r.proposed_risk_pct && <span>Risk: <strong style={{color:'var(--text)'}}>{r.proposed_risk_pct}%</strong></span>}
        {r.fixed_plan && <span>Fixný plán: <strong style={{color:'var(--text)'}}>{r.fixed_plan}</strong></span>}
      </div>
      {customConds.map((c, i) => (
        <div key={i} className="condition-item">
          <div className={`condition-dot ${c.met === 'Áno' ? 'cond-active' : 'cond-inactive'}`}/>
          <span style={{fontSize:'0.82rem'}}>{c.text}</span>
          <span style={{fontSize:'0.75rem', color: c.met === 'Áno' ? 'var(--green)' : 'var(--text2)', marginLeft:'auto'}}>{c.met}</span>
        </div>
      ))}
      {r.comment && (
        <div style={{background:'var(--bg2)', borderRadius:7, padding:'8px 12px', fontSize:'0.85rem', fontStyle:'italic', color:'var(--text2)', lineHeight:1.5, marginTop:8}}>
          💬 „{r.comment}"
        </div>
      )}
    </div>
  );

function NewTradeForm({ onNavigate, config, currentUser }) {
  const traderName = currentUser?.trader_name || '';
  const [form, setForm] = useState({
    submitted_by: traderName || config.traders[0] || '',
    instrument: config.instruments[0] || '',
    timeframe: 'H1',
    direction: 'Long',
    trend_context: 'Do trendu',
    htf_confirmed: 'Áno',
    entry_type: 'Limit',
    idea_description: '',
    entry_price: '', stop_loss: '', take_profit: '',
    condition1: '', condition2: '', condition3: '', condition4: '',
  });
  const [imageFile, setImageFile] = useState(null);
  const [imagePreview, setImagePreview] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const fileInputRef = useRef();

  const set = (k, v) => setForm(f => ({...f, [k]: v}));

  const handleImageSelect = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setImageFile(file);
    const base64 = await resizeImageToBase64(file);
    setImagePreview(base64);
  };

  const handleSubmit = async (e) => {
    e.preventDefault();
    if (!form.idea_description.trim()) { setError('Vyplň popis myšlienky/setupu.'); return; }
    setLoading(true); setError('');
    try {
      const { id } = await apiFetch('/api/trades', { method: 'POST', body: form });
      // Upload image if selected
      if (imagePreview) {
        await apiFetch(`/api/trades/${id}/image`, { method: 'POST', body: { image_data: imagePreview } });
      }
      onNavigate('trade-detail', id);
    } catch (e) { setError(e.message); setLoading(false); }
  };

  // Calculate RRR preview
  let rrrPreview = null;
  const entry = parseFloat(form.entry_price), sl = parseFloat(form.stop_loss), tp = parseFloat(form.take_profit);
  if (!isNaN(entry) && !isNaN(sl) && !isNaN(tp) && Math.abs(entry - sl) > 0) {
    rrrPreview = (Math.abs(tp - entry) / Math.abs(entry - sl)).toFixed(2);

    <div>
      <div className="back-btn" onClick={() => onNavigate('trades')}>← Späť na zoznam</div>

                  {config.traders.map(t => <option key={t}>{t}</option>)}

              )}
            </div>
            <div className="form-group">
              <label>Instrument *</label>
              <select value={form.instrument} onChange={e => set('instrument', e.target.value)} required>
                {config.instruments.map(i => <option key={i}>{i}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label>Timeframe *</label>
              <select value={form.timeframe} onChange={e => set('timeframe', e.target.value)}>
                {tfs.map(t => <option key={t}>{t}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label>Smer *</label>
              <select value={form.direction} onChange={e => set('direction', e.target.value)}>
                <option>Long</option><option>Short</option>
              </select>
            </div>
            <div className="form-group">
              <label>Kontext trendu *</label>
              <select value={form.trend_context} onChange={e => set('trend_context', e.target.value)}>
                <option>Do trendu</option><option>Proti trendu</option>
              </select>
            </div>
            <div className="form-group">
              <label>HTF potvrdenie?</label>
              <select value={form.htf_confirmed} onChange={e => set('htf_confirmed', e.target.value)}>

            <div className="form-group">

              <textarea value={form.idea_description} onChange={e => set('idea_description', e.target.value)}
                placeholder="Popíš setup, prečo vstupuješ, čo očakávaš..." required rows={4}/>
            </div>
          </div>
        </div>

        {/* Entry / SL / TP */}
        <div className="card" style={{marginBottom:16}}>
          <div className="section-title">Plánované hodnoty (voliteľné)</div>
          <div className="form-grid form-grid-3">

// ─── STATS PAGE ───────────────────────────────────────────────────────────────

function StatsPage() {
  const [stats, setStats] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    apiFetch('/api/stats/traders').then(s => { setStats(s); setLoading(false); }).catch(console.error);
  }, []);

  if (loading) return <div style={{display:'flex',alignItems:'center',gap:10,padding:40}}><div className="spinner"/></div>;

  // Sort by win rate (desc), then by total trades
  const sorted = [...stats].sort((a, b) => {
    if (a.win_rate !== null && b.win_rate !== null) return b.win_rate - a.win_rate;
    if (a.win_rate !== null) return -1;
    if (b.win_rate !== null) return 1;
    return b.trades_submitted - a.trades_submitted;
  });

  const medals = ['🥇', '🥈', '🥉'];

  return (
    <div>
      <div className="page-title" style={{marginBottom:22}}>📈 Štatistiky traderov</div>
      <div className="stats-grid">
        {sorted.map((s, i) => (
          <div key={s.trader} className="card">
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:14}}>
              <div>
                <div style={{fontSize:'0.85rem', color:'var(--text2)'}}>{medals[i] || `#${i+1}`}</div>
                <div style={{fontSize:'1.3rem', fontWeight:800}}>{s.trader}</div>
              </div>
              {s.win_rate !== null && (
                <div style={{textAlign:'right'}}>
                  <div style={{fontSize:'0.72rem', color:'var(--text2)'}}>WIN RATE</div>
                  <div style={{fontSize:'1.6rem', fontWeight:800, color: s.win_rate >= 50 ? 'var(--green)' : 'var(--yellow)'}}>
                    {s.win_rate}%
                  </div>
                </div>
              )}
            </div>
            <div className="stat-row">
              <span style={{color:'var(--text2)'}}>Zadané obchody</span>
              <strong>{s.trades_submitted}</strong>
            </div>
            <div className="stat-row">
              <span style={{color:'var(--text2)'}}>Uzatvorené</span>
              <strong>{s.trades_closed}</strong>
            </div>
            {s.trades_closed > 0 && (
              <>
                <div className="stat-row">
                  <span style={{color:'var(--text2)'}}>Ziskové / stratové</span>
                  <strong><span style={{color:'var(--green)'}}>{s.trades_profitable}</span> / <span style={{color:'var(--red)'}}>{s.trades_closed - s.trades_profitable}</span></strong>
                </div>
                <div className="stat-row">
                  <span style={{color:'var(--text2)'}}>Celkové pips</span>
                  <strong className={s.total_pips >= 0 ? 'result-pos' : 'result-neg'}>{s.total_pips >= 0 ? '+' : ''}{s.total_pips}</strong>
                </div>
                {s.avg_rr_closed && (
                  <div className="stat-row">
                    <span style={{color:'var(--text2)'}}>Priem. R výsledok</span>
                    <strong className={s.avg_rr_closed >= 0 ? 'result-pos' : 'result-neg'}>{s.avg_rr_closed >= 0 ? '+' : ''}{s.avg_rr_closed}R</strong>
                  </div>
                )}
              </>
            )}
            <div className="stat-row">
              <span style={{color:'var(--text2)'}}>Hodnotenia</span>
              <strong>{s.reviews_given}</strong>
            </div>
            {s.avg_rrr_proposed && (
              <div className="stat-row">
                <span style={{color:'var(--text2)'}}>Priem. navrhnuté RRR</span>
                <strong style={{color: s.avg_rrr_proposed >= 1.5 ? 'var(--green)' : 'var(--yellow)'}}>{s.avg_rrr_proposed}</strong>
              </div>
            )}
            {s.trades_closed === 0 && s.trades_submitted === 0 && (
              <div style={{textAlign:'center', padding:'14px 0', color:'var(--text2)', fontSize:'0.82rem'}}>Zatiaľ žiadne obchody</div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

  const isAdmin = currentUser?.role === 'admin';
  const [newTrader, setNewTrader] = useState('');
  const [newInstrument, setNewInstrument] = useState('');
  const [params, setParams] = useState(config.parameters);
  const [saved, setSaved] = useState('');
  const [error, setError] = useState('');

  // User management (admin)
  const [users, setUsers] = useState([]);
  const [newUser, setNewUser] = useState({ username: '', password: '', role: 'trader', trader_name: '' });
  const [pwdChange, setPwdChange] = useState({ userId: null, password: '' });
  const [userMsg, setUserMsg] = useState('');

  useEffect(() => {
    if (isAdmin) apiFetch('/api/users').then(setUsers).catch(console.error);
  }, [isAdmin]);

  const addTrader = async () => {
    if (!newTrader.trim()) return;
    await apiFetch('/api/config/traders', { method: 'POST', body: { name: newTrader.trim() } });
    setNewTrader(''); onConfigChange();
  };
  const removeTrader = async (name) => {
    await apiFetch(`/api/config/traders/${encodeURIComponent(name)}`, { method: 'DELETE' });
    onConfigChange();
  };
  const addInstrument = async () => {
    if (!newInstrument.trim()) return;
    await apiFetch('/api/config/instruments', { method: 'POST', body: { name: newInstrument.trim() } });
    setNewInstrument(''); onConfigChange();
  };
  const removeInstrument = async (name) => {
    await apiFetch(`/api/config/instruments/${encodeURIComponent(name)}`, { method: 'DELETE' });
    onConfigChange();
  };
  const saveParams = async () => {
    try {
      await apiFetch('/api/config/parameters', { method: 'PUT', body: params });
      setSaved('Parametre uložené!'); setTimeout(() => setSaved(''), 3000); onConfigChange();
    } catch (e) { setError(e.message); }
  };

  const createUser = async () => {
    if (!newUser.username || !newUser.password) { setUserMsg('Meno a heslo sú povinné'); return; }
    try {
      await apiFetch('/api/users', { method: 'POST', body: newUser });
      setNewUser({ username: '', password: '', role: 'trader', trader_name: '' });
      const updated = await apiFetch('/api/users');
      setUsers(updated);
      setUserMsg('Používateľ vytvorený!'); setTimeout(() => setUserMsg(''), 3000);
    } catch (e) { setUserMsg(e.message); }
  };

  const deleteUser = async (id, username) => {
    if (!confirm(`Vymazať používateľa "${username}"?`)) return;
    await apiFetch(`/api/users/${id}`, { method: 'DELETE' });
    setUsers(users.filter(u => u.id !== id));
  };

  const changePassword = async (userId) => {
    if (pwdChange.password.length < 6) { setUserMsg('Heslo musí mať aspoň 6 znakov'); return; }
    try {
      await apiFetch(`/api/users/${userId}/password`, { method: 'PUT', body: { password: pwdChange.password } });
      setPwdChange({ userId: null, password: '' });
      setUserMsg('Heslo zmenené!'); setTimeout(() => setUserMsg(''), 3000);
    } catch (e) { setUserMsg(e.message); }
  };

  return (
    <div>
      <div className="page-title" style={{marginBottom:22}}>⚙️ Nastavenia</div>
      {saved && <div className="alert alert-success">{saved}</div>}
      {error && <div className="alert alert-error">{error}</div>}

      {isAdmin && (
        <>
          <div className="card settings-section">
            <div className="section-title">Členovia tímu</div>
            <div className="tag-list">
              {config.traders.map(t => (
                <div key={t} className="tag">👤 {t}
                  <span className="tag-remove" onClick={() => removeTrader(t)}>×</span>
                </div>
              ))}
            </div>
            <div style={{display:'flex', gap:8, marginTop:12}}>
              <input value={newTrader} onChange={e => setNewTrader(e.target.value)} placeholder="Meno nového tradera"
                style={{maxWidth:220}} onKeyDown={e => e.key==='Enter' && addTrader()}/>
              <button className="btn btn-secondary btn-sm" onClick={addTrader}>+ Pridať</button>
            </div>
          </div>

          <div className="card settings-section">
            <div className="section-title">Instrumenty</div>
            <div className="tag-list">
              {config.instruments.map(i => (
                <div key={i} className="tag">📈 {i}
                  <span className="tag-remove" onClick={() => removeInstrument(i)}>×</span>
                </div>
              ))}
            </div>
            <div style={{display:'flex', gap:8, marginTop:12}}>
              <input value={newInstrument} onChange={e => setNewInstrument(e.target.value)} placeholder="Napr. EUR/GBP"
                style={{maxWidth:220}} onKeyDown={e => e.key==='Enter' && addInstrument()}/>
              <button className="btn btn-secondary btn-sm" onClick={addInstrument}>+ Pridať</button>
            </div>
          </div>
        </>
      )}

      <div className="card settings-section">
        <div className="section-title">Parametre rizika</div>
        <div className="form-grid form-grid-3" style={{maxWidth:480}}>
          <div className="form-group">
            <label>Min. RRR</label>
            <input type="number" step="0.1" value={params.min_rrr} onChange={e => setParams(p => ({...p, min_rrr: e.target.value}))}
              readOnly={!isAdmin}/>
          </div>
          <div className="form-group">
            <label>Max risk do trendu (%)</label>
            <input type="number" step="0.1" value={params.max_risk_trend} onChange={e => setParams(p => ({...p, max_risk_trend: e.target.value}))}
              readOnly={!isAdmin}/>
          </div>
          <div className="form-group">
            <label>Max risk proti trendu (%)</label>
            <input type="number" step="0.1" value={params.max_risk_counter} onChange={e => setParams(p => ({...p, max_risk_counter: e.target.value}))}
              readOnly={!isAdmin}/>
          </div>
        </div>
        {isAdmin && (
          <div style={{marginTop:14}}>
            <button className="btn btn-primary" onClick={saveParams}>💾 Uložiť parametre</button>
          </div>
        )}
        <div style={{marginTop:12, fontSize:'0.8rem', color:'var(--text2)', lineHeight:1.6}}>
          <strong>Logika verdiktu:</strong><br/>
          ✅ <strong>Obchodovať</strong> — aspoň 2 schválenia<br/>
          ⚠️ <strong>Na potvrdenie</strong> — aspoň 1 schválenie + 1 revízia, žiadne zamietnutie<br/>
          ❌ <strong>Neobchodovať</strong> — tím sa nezhodol
        </div>
      </div>

      {/* Podmienky */}
      <ConditionsManager currentUser={currentUser} />

      {/* Zmena vlastného hesla */}
      <div className="card settings-section">
        <div className="section-title">Zmena hesla</div>
        <ChangePasswordForm currentUser={currentUser} />
      </div>

      {/* Admin: User management */}
      {isAdmin && (
        <div className="card settings-section">
          <div className="section-title">Správa používateľov</div>
          {userMsg && <div className={`alert ${userMsg.includes('vytvor') || userMsg.includes('zmen') ? 'alert-success' : 'alert-error'}`}>{userMsg}</div>}

          <table className="user-table" style={{marginBottom:20}}>
            <thead>
              <tr>
                <th>Meno</th><th>Trader</th><th>Rola</th><th>Vytvorený</th><th>Akcie</th>
              </tr>
            </thead>
            <tbody>
              {users.map(u => (
                <tr key={u.id}>
                  <td><strong>{u.username}</strong></td>
                  <td>{u.trader_name || <span style={{color:'var(--text2)'}}>—</span>}</td>
                  <td><span className={`badge ${u.role === 'admin' ? 'badge-yellow' : 'badge-blue'}`}>{u.role}</span></td>
                  <td style={{color:'var(--text2)'}}>{u.created_at}</td>
                  <td>
                    <div style={{display:'flex', gap:6, flexWrap:'wrap'}}>
                      {pwdChange.userId === u.id ? (
                        <>
                          <input type="password" value={pwdChange.password} onChange={e => setPwdChange(p => ({...p, password: e.target.value}))}
                            placeholder="Nové heslo" style={{width:130, padding:'4px 8px', fontSize:'0.8rem'}}/>
                          <button className="btn btn-primary btn-sm" onClick={() => changePassword(u.id)}>✓</button>
                          <button className="btn btn-secondary btn-sm" onClick={() => setPwdChange({userId:null,password:''})}>×</button>
                        </>
                      ) : (
                        <>
                          <button className="btn btn-secondary btn-sm" onClick={() => setPwdChange({userId:u.id, password:''})}>🔑 Heslo</button>
                          {u.username !== 'admin' && (
                            <button className="btn btn-danger btn-sm" onClick={() => deleteUser(u.id, u.username)}>🗑</button>
                          )}
                        </>
                      )}
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>

          <div style={{borderTop:'1px solid var(--border)', paddingTop:16}}>
            <div style={{fontSize:'0.85rem', fontWeight:600, marginBottom:12}}>Pridať nového používateľa</div>
            <div className="form-grid" style={{marginBottom:10}}>
              <div className="form-group">
                <label>Prihlasovacie meno</label>
                <input value={newUser.username} onChange={e => setNewUser(u => ({...u, username: e.target.value}))} placeholder="napr. novak"/>
              </div>
              <div className="form-group">
                <label>Heslo</label>
                <input type="password" value={newUser.password} onChange={e => setNewUser(u => ({...u, password: e.target.value}))} placeholder="min. 6 znakov"/>
              </div>
              <div className="form-group">
                <label>Rola</label>
                <select value={newUser.role} onChange={e => setNewUser(u => ({...u, role: e.target.value}))}>
                  <option value="trader">trader</option>
                  <option value="admin">admin</option>
                </select>
              </div>
              <div className="form-group">
                <label>Trader (meno v tíme)</label>
                <select value={newUser.trader_name} onChange={e => setNewUser(u => ({...u, trader_name: e.target.value}))}>
                  <option value="">— žiadny —</option>
                  {config.traders.map(t => <option key={t} value={t}>{t}</option>)}
                </select>
              </div>
            </div>
            <button className="btn btn-primary btn-sm" onClick={createUser}>+ Vytvoriť účet</button>
          </div>
        </div>
      )}
    </div>
  );
}

function ChangePasswordForm({ currentUser }) {
  const [form, setForm] = useState({ password: '', confirm: '' });
  const [msg, setMsg] = useState('');
  const [err, setErr] = useState('');

  const handleSubmit = async (e) => {
    e.preventDefault();
    if (form.password !== form.confirm) { setErr('Heslá sa nezhodujú'); return; }
    if (form.password.length < 6) { setErr('Heslo musí mať aspoň 6 znakov'); return; }
    setErr('');
    try {
      await apiFetch(`/api/users/${currentUser.id}/password`, { method: 'PUT', body: { password: form.password } });
      setForm({ password: '', confirm: '' });
      setMsg('Heslo zmenené!'); setTimeout(() => setMsg(''), 3000);
    } catch (e) { setErr(e.message); }
  };

  return (
    <form onSubmit={handleSubmit}>
      {msg && <div className="alert alert-success">{msg}</div>}
      {err && <div className="alert alert-error">{err}</div>}
      <div className="form-grid" style={{maxWidth:400}}>
        <div className="form-group">
          <label>Nové heslo</label>
          <input type="password" value={form.password} onChange={e => setForm(f => ({...f, password: e.target.value}))} placeholder="min. 6 znakov"/>
        </div>
        <div className="form-group">
          <label>Potvrdiť heslo</label>
          <input type="password" value={form.confirm} onChange={e => setForm(f => ({...f, confirm: e.target.value}))} placeholder="zopakuj heslo"/>
        </div>
      </div>
      <button type="submit" className="btn btn-secondary btn-sm" style={{marginTop:10}}>🔑 Zmeniť heslo</button>
    </form>
  );
}

// ─── NOTIFICATION BELL ────────────────────────────────────────────────────────

function NotificationBell({ currentUser, onNavigate }) {
  const [notifs, setNotifs] = useState([]);
  const [unread, setUnread] = useState(0);
  const [open, setOpen] = useState(false);
  const panelRef = useRef(null);
  const prevUnread = useRef(-1);

  const fetchNotifs = useCallback(async () => {
    if (!currentUser) return;
    try {
      const data = await apiFetch('/api/notifications');
      const newUnread = data.unread || 0;
      // Browser notification when new items arrive
      if (prevUnread.current >= 0 && newUnread > prevUnread.current) {
        const latest = data.notifications?.find(n => !n.read);
        if (latest && 'Notification' in window && Notification.permission === 'granted') {
          new Notification('TMTM Trading', { body: latest.message });
        }
      }
      prevUnread.current = newUnread;
      setNotifs(data.notifications || []);
      setUnread(newUnread);
    } catch {}
  }, [currentUser]);

  useEffect(() => {
    // Request browser notification permission
    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission();
    }
    fetchNotifs();
    const iv = setInterval(fetchNotifs, 30000);
    return () => clearInterval(iv);
  }, [fetchNotifs]);

  useEffect(() => {
    if (!open) return;
    const handler = (e) => {
      if (panelRef.current && !panelRef.current.contains(e.target)) setOpen(false);
    };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [open]);

  const markRead = async () => {
    try {
      await apiFetch('/api/notifications/read', { method: 'POST', body: {} });
      prevUnread.current = 0;
      setUnread(0);
      setNotifs(n => n.map(x => ({...x, read: 1})));
    } catch {}
  };

  const handleToggle = () => {
    setOpen(o => !o);
    if (!open && unread > 0) markRead();
  };

  const typeIcon = (t) => ({ new_trade: '📊', new_review: '📋', trade_approved: '✅' }[t] || '🔔');

  const formatTime = (ts) => {
    try {
      const diff = (Date.now() - new Date(ts)) / 1000;
      if (diff < 60) return 'práve teraz';
      if (diff < 3600) return Math.floor(diff/60) + ' min';
      if (diff < 86400) return Math.floor(diff/3600) + ' hod';
      return new Date(ts).toLocaleDateString('sk');
    } catch { return ts || ''; }
  };

  return (
    <div ref={panelRef} style={{position:'relative'}}>
      <button className="notif-btn" onClick={handleToggle} title="Notifikácie">
        🔔
        {unread > 0 && <span className="notif-badge">{unread > 9 ? '9+' : unread}</span>}
      </button>
      {open && (
        <div className="notif-panel">
          <div className="notif-panel-header">
            <span>🔔 Notifikácie {unread > 0 && <span className="badge badge-red" style={{marginLeft:6}}>{unread}</span>}</span>
            {notifs.length > 0 && (
              <button className="btn btn-secondary btn-sm" onClick={markRead}
                style={{padding:'2px 8px', fontSize:'0.7rem'}}>Všetko prečítané</button>
            )}
          </div>
          {notifs.length === 0 ? (
            <div style={{padding:'28px 16px', textAlign:'center', color:'var(--text2)', fontSize:'0.83rem'}}>
              Žiadne notifikácie
            </div>
          ) : notifs.map(n => (
            <div key={n.id} className={`notif-item ${!n.read ? 'unread' : ''}`}
              onClick={() => { setOpen(false); if (n.trade_id) onNavigate('trade-detail', n.trade_id); }}>
              <div style={{display:'flex', gap:9, alignItems:'flex-start'}}>
                <span style={{fontSize:'1.1rem', marginTop:1}}>{typeIcon(n.type)}</span>
                <div style={{flex:1}}>
                  <div className="notif-msg">{n.message}</div>
                  <div className="notif-time">{formatTime(n.created_at)}</div>
                </div>
                {!n.read && <div style={{width:6, height:6, borderRadius:'50%', background:'var(--accent)', marginTop:5, flexShrink:0}}/>}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── CONDITIONS MANAGER ────────────────────────────────────────────────────────

function ConditionsManager({ currentUser }) {
  const isAdmin = currentUser?.role === 'admin';
  const myName = currentUser?.trader_name || currentUser?.username || '';
  const [teamConds, setTeamConds] = useState([]);
  const [personalConds, setPersonalConds] = useState([]);
  const [newTeam, setNewTeam] = useState('');
  const [newPersonal, setNewPersonal] = useState('');
  const [msg, setMsg] = useState('');

  const load = useCallback(async () => {
    try {
      const [team, personal] = await Promise.all([
        apiFetch('/api/conditions?type=team'),
        myName ? apiFetch(`/api/conditions?type=personal&trader=${encodeURIComponent(myName)}`) : Promise.resolve([]),
      ]);
      setTeamConds(team);
      setPersonalConds(personal);
    } catch(e) { console.error(e); }
  }, [myName]);

  useEffect(() => { load(); }, [load]);

  const flash = (m) => { setMsg(m); setTimeout(() => setMsg(''), 3000); };

  const addTeam = async () => {
    if (!newTeam.trim()) return;
    try {
      await apiFetch('/api/conditions', { method:'POST', body:{ type:'team', text:newTeam.trim() }});
      setNewTeam(''); await load(); flash('Podmienka pridaná!');
    } catch(e) { flash(e.message); }
  };
  const addPersonal = async () => {
    if (!newPersonal.trim()) return;
    try {
      await apiFetch('/api/conditions', { method:'POST', body:{ type:'personal', text:newPersonal.trim() }});
      setNewPersonal(''); await load(); flash('Podmienka pridaná!');
    } catch(e) { flash(e.message); }
  };
  const remove = async (id) => {
    try { await apiFetch(`/api/conditions/${id}`, { method:'DELETE' }); await load(); }
    catch(e) { flash(e.message); }
  };

  const CondList = ({ items, onRemove }) => (
    <div style={{marginBottom:10}}>
      {items.length === 0 ? (
        <div style={{color:'var(--text2)', fontSize:'0.82rem', padding:'6px 0'}}>Žiadne podmienky</div>
      ) : items.map((c, i) => (
        <div key={c.id} style={{display:'flex', alignItems:'center', gap:8, padding:'7px 0', borderBottom:'1px solid var(--border)'}}>
          <span style={{color:'var(--accent)', fontSize:'0.72rem', fontWeight:700, minWidth:22}}>#{i+1}</span>
          <span style={{flex:1, fontSize:'0.875rem'}}>{c.text}</span>
          <button className="btn btn-danger btn-sm" onClick={() => onRemove(c.id)} style={{padding:'1px 8px', fontSize:'0.8rem'}}>×</button>
        </div>
      ))}
    </div>
  );

  return (
    <>
      {msg && <div className="alert alert-success" style={{marginBottom:12}}>{msg}</div>}

      {isAdmin && (
        <div className="card settings-section">
          <div className="section-title">🏆 Tímové podmienky</div>
          <div style={{fontSize:'0.78rem', color:'var(--text2)', marginBottom:10}}>
            Predvyplnené pri hodnotení obchodu pre každého tradera.
          </div>
          <CondList items={teamConds} onRemove={remove} />
          <div style={{display:'flex', gap:8, marginTop:8}}>
            <input value={newTeam} onChange={e => setNewTeam(e.target.value)}
              placeholder="Napr. HTF trend potvrdený..." style={{flex:1}}
              onKeyDown={e => e.key==='Enter' && addTeam()}/>
            <button className="btn btn-secondary btn-sm" onClick={addTeam} style={{whiteSpace:'nowrap'}}>+ Pridať</button>
          </div>
        </div>
      )}

      <div className="card settings-section">
        <div className="section-title">👤 Moje osobné podmienky</div>
        <div style={{fontSize:'0.78rem', color:'var(--text2)', marginBottom:10}}>
          Predvyplnené pri tvojich hodnoteniach. Uložené iba pre teba.
        </div>
        <CondList items={personalConds} onRemove={remove} />
        <div style={{display:'flex', gap:8, marginTop:8}}>
          <input value={newPersonal} onChange={e => setNewPersonal(e.target.value)}
            placeholder="Napr. Čakám na potvrdenie 15m..." style={{flex:1}}
            onKeyDown={e => e.key==='Enter' && addPersonal()}/>
          <button className="btn btn-secondary btn-sm" onClick={addPersonal} style={{whiteSpace:'nowrap'}}>+ Pridať</button>
        </div>
      </div>
    </>
  );
}

// ─── APP ROOT ──────────────────────────────────────────────────────────────────

function App() {

  const [pageParam, setPageParam] = useState(null);
  const [config, setConfig] = useState(null);
  const [reviewTrade, setReviewTrade] = useState(null);
  const [refreshKey, setRefreshKey] = useState(0);

  // Check existing session on mount
  useEffect(() => {
    const token = getToken();
    if (!token) { setAuthChecked(true); return; }
    apiFetch('/api/auth/me')
      .then(({ user }) => { setCurrentUser(user); setAuthChecked(true); })
      .catch(() => { clearToken(); setAuthChecked(true); });
  }, []);

  const loadConfig = useCallback(() => {
    apiFetch('/api/config').then(setConfig).catch(console.error);
  }, []);

  useEffect(() => {
    if (currentUser) loadConfig();
  }, [currentUser, loadConfig]);

  const handleLogin = (user) => { setCurrentUser(user); };

  const handleLogout = async () => {
    try { await apiFetch('/api/auth/logout', { method: 'POST' }); } catch {}
    clearToken();
    setCurrentUser(null);
    setConfig(null);
    setPage('dashboard');
  };

  const navigate = (p, param = null) => { setPage(p); setPageParam(param); };
  const handleReview = (trade) => setReviewTrade(trade);
  const handleReviewSubmitted = () => setRefreshKey(k => k+1);

      <div className="spinner" style={{width:28,height:28}}/>

    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',gap:12}}>
      <div className="spinner" style={{width:28,height:28}}/>
      <span style={{color:'var(--text2)'}}>Načítavam konfiguráciu...</span>

  return (

            <div className="user-avatar">{initials}</div>
            <div>
              <div className="user-name">{currentUser.trader_name || currentUser.username}</div>
              <div className="user-role">{currentUser.role === 'admin' ? '👑 admin' : '👤 trader'}</div>
            </div>
          </div>
          <button className="btn btn-secondary btn-sm" style={{width:'100%', justifyContent:'center'}} onClick={handleLogout}>
            🚪 Odhlásiť sa
          </button>
        </div>
      </div>

      <div className="main">
        {page === 'dashboard' && <Dashboard onNavigate={navigate} key={refreshKey} />}
        {page === 'trades' && <TradesList onNavigate={navigate} key={refreshKey} />}
        {page === 'new-trade' && <NewTradeForm onNavigate={navigate} config={config} currentUser={currentUser} />}
        {page === 'trade-detail' && (
          <TradeDetail tradeId={pageParam} onNavigate={navigate} onReview={handleReview}
            currentUser={currentUser} key={`${pageParam}-${refreshKey}`} />
        )}
        {page === 'stats' && <StatsPage key={refreshKey} />}
        {page === 'settings' && <Settings config={config} onConfigChange={loadConfig} currentUser={currentUser} />}
      </div>

      {reviewTrade && (
        <ReviewModal
          trade={reviewTrade}
          config={config}
          currentUser={currentUser}
          onClose={() => setReviewTrade(null)}
          onSubmitted={handleReviewSubmitted}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
